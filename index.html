<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMSi Product Roadmap</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      padding: 24px;
      background: #F7F7F5;
      font-family: 'DM Sans', sans-serif;
    }
    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 20px; font-weight: 600; color: #1A1A1A; }
    .gantt-wrap {
      overflow: auto;
      max-height: calc(100vh - 80px);
      border-radius: 8px;
      border: 1px solid #E0E0DC;
    }
    .gantt {
      display: grid;
      grid-template-columns: 120px 190px repeat(6, 110px);
      min-width: 980px;
      background: #fff;
    }
    .hdr-cell {
      background: #F7F7F5;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #888;
      padding: 10px 12px;
      border-bottom: 2px solid #E0E0DC;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
    }
    .hdr-product    { left: 0;     z-index: 6; }
    .hdr-initiative { left: 120px; z-index: 5; }
    .hdr-quarter    { z-index: 4; justify-content: center; }
    .product-cell {
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      position: sticky;
      left: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      text-align: right;
      padding: 0 10px;
      border-bottom: 1px solid #EAEAE6;
      border-right: 1px solid rgba(255,255,255,0.15);
    }
    .label-cell {
      font-size: 11px;
      color: #333;
      position: sticky;
      left: 120px;
      z-index: 1;
      display: flex;
      align-items: center;
      padding: 0 10px;
      min-height: 34px;
      border-bottom: 1px solid #F3F3F0;
      border-right: 1px solid #EAEAE6;
    }
    .bar-area {
      position: relative;
      min-height: 34px;
      background: #F7F7F5;
      border-bottom: 1px solid #F3F3F0;
    }
    .bar {
      position: absolute;
      height: 22px;
      top: 6px;
      border-radius: 4px;
      opacity: 0.88;
      cursor: pointer;
      transition: opacity 0.1s ease;
    }
    .bar:hover { opacity: 1; }
    .today-line {
      position: absolute;
      top: 0; bottom: 0;
      width: 1px;
      background: #DC4405;
      opacity: 0.5;
      pointer-events: none;
      z-index: 3;
    }
    .popover {
      position: fixed;
      z-index: 9999;
      width: 240px;
      background: #fff;
      border: 1px solid #E0E0DC;
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.10);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease;
    }
    .popover.visible { opacity: 1; pointer-events: auto; }
    .pop-close {
      position: absolute; top: 8px; right: 10px;
      background: none; border: none;
      color: #BBB; cursor: pointer;
      font-size: 14px; line-height: 1; padding: 2px 4px;
    }
    .pop-close:hover { color: #555; }
    .pop-title {
      font-size: 13px; font-weight: 600; color: #1A1A1A;
      padding-right: 22px; margin-bottom: 8px; line-height: 1.4;
    }
    .pop-divider { border: none; border-top: 1px solid #F0F0EC; margin: 0 0 8px; }
    .status-pill {
      display: inline-block; padding: 2px 6px; border-radius: 20px;
      font-size: 9.5px; font-weight: 600; letter-spacing: 0.02em;
      line-height: 1.6; white-space: nowrap; margin-bottom: 8px;
    }
    .pop-desc { font-size: 11.5px; color: #777; line-height: 1.6; }
    .pop-desc.no-desc { font-style: italic; color: #BBB; font-size: 11px; }
    .pop-progress-wrap { margin: 8px 0 4px; }
    .pop-progress-label { font-size: 10px; color: #999; margin-bottom: 3px; }
    .pop-progress-track { height: 5px; background: #EAEAE6; border-radius: 3px; overflow: hidden; }
    .pop-progress-fill  { height: 100%; border-radius: 3px; background: #0077C8; transition: width 0.2s; }
    .pop-goals { margin-top: 8px; }
    .pop-goals-label { font-size: 10px; color: #999; margin-bottom: 3px; }
    .pop-goals-list  { list-style: none; padding: 0; margin: 0; }
    .pop-goals-list li { font-size: 11px; color: #555; padding: 1px 0 1px 10px; position: relative; }
    .pop-goals-list li::before { content: '–'; position: absolute; left: 0; color: #BBB; }
    .loading-msg { padding: 40px; text-align: center; color: #999; font-size: 13px; }
  </style>
</head>
<body>
  <div class="page-header"><h1>DMSi Product Roadmap</h1></div>
  <div class="gantt-wrap">
    <div id="loading" class="loading-msg">Loading roadmap data…</div>
    <div class="gantt" id="gantt" style="display:none"></div>
  </div>
  <div class="popover" id="popover">
    <button class="pop-close" id="popClose">&#215;</button>
    <div class="pop-title" id="popTitle"></div>
    <hr class="pop-divider">
    <span class="status-pill" id="popPill"></span>
    <div class="pop-progress-wrap" id="popProgressWrap">
      <div class="pop-progress-label" id="popProgressLabel"></div>
      <div class="pop-progress-track"><div class="pop-progress-fill" id="popProgressFill"></div></div>
    </div>
    <div class="pop-desc" id="popDesc"></div>
    <div class="pop-goals" id="popGoals"></div>
  </div>

  <script>
    var WIN_START = new Date('2026-04-01');
    var WIN_END   = new Date('2027-10-01');
    var TODAY     = new Date('2026-06-08');
    var BAR_PX    = 660;
    var WIN_MS    = WIN_END - WIN_START;

    var QUARTERS = ['Q2 2026','Q3 2026','Q4 2026','Q1 2027','Q2 2027','Q3 2027'];
    var WS_COLORS = ['#0077C8','#DC4405','#78BE20','#545859','#6B3FA0','#00A3A1','#E8A000','#C0392B'];

    function hexTint(hex, op) {
      var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return 'rgb('+Math.round(r+(255-r)*(1-op))+','+Math.round(g+(255-g)*(1-op))+','+Math.round(b+(255-b)*(1-op))+')';
    }
    function datePct(d) { return (d - WIN_START) / WIN_MS; }
    function parseDate(s) { return s ? new Date(s + 'T00:00:00') : null; }
    function mapStatus(raw) {
      var s = (raw||'').toLowerCase();
      if (s === 'achieved') return 'Completed';
      if (s === 'at risk' || s === 'some progress' || s === 'on track') return 'In process';
      return 'Not started';
    }
    function pillStyle(label) {
      if (label === 'In process') return { bg:'#FAEEDA', fg:'#854F0B' };
      if (label === 'Completed')  return { bg:'#EAF3DE', fg:'#3B6D11' };
      return { bg:'#F1EFE8', fg:'#5F5E5A' };
    }

    function buildGantt(DATA) {
    DATA.forEach(function(g, i) { g.color = WS_COLORS[i % WS_COLORS.length]; });

    function makeDiv(cls) {
      var d = document.createElement('div');
      if (cls) d.className = cls;
      return d;
    }

    // Header row
    var hProd = makeDiv('hdr-cell hdr-product');
    hProd.textContent = 'Product';
    hProd.style.gridColumn = '1';
    hProd.style.gridRow = '1';
    gantt.appendChild(hProd);

    var hInit = makeDiv('hdr-cell hdr-initiative');
    hInit.textContent = 'Initiative';
    hInit.style.gridColumn = '2';
    hInit.style.gridRow = '1';
    gantt.appendChild(hInit);

    QUARTERS.forEach(function(q, i) {
      var cell = makeDiv('hdr-cell hdr-quarter');
      cell.textContent = q;
      cell.style.gridColumn = String(3 + i);
      cell.style.gridRow = '1';
      gantt.appendChild(cell);
    });

    var todayPct  = datePct(TODAY);
    var todayPx   = (todayPct * BAR_PX).toFixed(1);
    var showToday = TODAY >= WIN_START && TODAY < WIN_END;

    var row = 2;
    DATA.forEach(function(group) {
      var count   = group.items.length;
      var labelBg = hexTint(group.color, 0.15);

      var prodCell = makeDiv('product-cell');
      prodCell.textContent = group.ws;
      prodCell.style.backgroundColor = group.color;
      prodCell.style.gridColumn = '1';
      prodCell.style.gridRow = row + ' / ' + (row + count);
      gantt.appendChild(prodCell);

      group.items.forEach(function(item) {
        var lc = makeDiv('label-cell');
        lc.textContent = item.name;
        lc.style.backgroundColor = labelBg;
        lc.style.gridColumn = '2';
        lc.style.gridRow = String(row);
        gantt.appendChild(lc);

        var ba = makeDiv('bar-area');
        ba.style.gridColumn = '3 / 9';
        ba.style.gridRow = String(row);

        if (showToday) {
          var tl = makeDiv('today-line');
          tl.style.left = todayPx + 'px';
          ba.appendChild(tl);
        }

        var sd = parseDate(item.s);
        var ed = parseDate(item.e);
        if (sd && ed) {
          var cs = sd < WIN_START ? WIN_START : sd;
          var ce = ed > WIN_END   ? WIN_END   : ed;
          var sp = datePct(cs);
          var ep = datePct(ce);
          var lx = (sp * BAR_PX).toFixed(1);
          var wx = Math.max((ep - sp) * BAR_PX, 8).toFixed(1);

          var bar = makeDiv('bar');
          bar.style.left = lx + 'px';
          bar.style.width = wx + 'px';
          bar.style.backgroundColor = group.color;
          bar.dataset.title    = item.name;
          bar.dataset.status   = item.status;
          bar.dataset.desc     = item.desc || '';
          bar.dataset.progress = item.progress || 0;
          bar.dataset.goals    = JSON.stringify(item.goals || []);
          bar.addEventListener('click', (function(b) {
            return function(ev) { ev.stopPropagation(); togglePop(b); };
          })(bar));
          ba.appendChild(bar);
        }

        gantt.appendChild(ba);
        row++;
      });
    });

    // Popover
    var pop              = document.getElementById('popover');
    var popTitle         = document.getElementById('popTitle');
    var popPill          = document.getElementById('popPill');
    var popDesc          = document.getElementById('popDesc');
    var popProgressWrap  = document.getElementById('popProgressWrap');
    var popProgressLabel = document.getElementById('popProgressLabel');
    var popProgressFill  = document.getElementById('popProgressFill');
    var popGoals         = document.getElementById('popGoals');
    var popClose         = document.getElementById('popClose');
    var openBar          = null;

    function showPop(bar) {
      var label = mapStatus(bar.dataset.status);
      var st    = pillStyle(label);
      popTitle.textContent = bar.dataset.title;
      popPill.textContent  = label;
      popPill.style.backgroundColor = st.bg;
      popPill.style.color           = st.fg;

      var d = bar.dataset.desc;
      if (d && d.trim()) {
        popDesc.textContent = d;
        popDesc.className = 'pop-desc';
      } else {
        popDesc.textContent = 'No description available.';
        popDesc.className = 'pop-desc no-desc';
      }

      var pct = parseInt(bar.dataset.progress, 10) || 0;
      if (pct > 0) {
        popProgressLabel.textContent = 'Progress — ' + pct + '%';
        popProgressFill.style.width  = pct + '%';
        popProgressWrap.style.display = '';
      } else {
        popProgressWrap.style.display = 'none';
      }

      var goals = [];
      try { goals = JSON.parse(bar.dataset.goals || '[]'); } catch(e) {}
      if (goals.length) {
        var ul = document.createElement('ul');
        ul.className = 'pop-goals-list';
        goals.forEach(function(g) {
          var li = document.createElement('li');
          li.textContent = g;
          ul.appendChild(li);
        });
        popGoals.innerHTML = '';
        var lbl = document.createElement('div');
        lbl.className = 'pop-goals-label';
        lbl.textContent = 'Goals';
        popGoals.appendChild(lbl);
        popGoals.appendChild(ul);
        popGoals.style.display = '';
      } else {
        popGoals.style.display = 'none';
      }

      var r = bar.getBoundingClientRect();
      var top  = r.bottom + 8;
      var left = r.left;
      if (left + 250 > window.innerWidth)  left = window.innerWidth - 256;
      if (top  + 200 > window.innerHeight) top  = r.top - 200;
      pop.style.top  = top  + 'px';
      pop.style.left = left + 'px';
      pop.classList.add('visible');
    }

    function hidePop() { pop.classList.remove('visible'); openBar = null; }

    function togglePop(bar) {
      if (openBar === bar) { hidePop(); return; }
      openBar = bar;
      showPop(bar);
    }

    popClose.addEventListener('click', hidePop);
    document.addEventListener('click', function(e) {
      if (!pop.contains(e.target) && !e.target.classList.contains('bar')) hidePop();
    });
    } // end buildGantt

    // Load live data from data.json (written by GitHub Actions every 5 minutes)
    fetch('./data.json')
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        document.getElementById('loading').style.display = 'none';
        gantt.style.display = '';
        buildGantt(data);
      })
      .catch(function(err) {
        document.getElementById('loading').textContent = 'Failed to load roadmap data. (' + err.message + ')';
      });
  </script>
</body>
</html>
