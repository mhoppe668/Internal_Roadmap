name: Refresh Roadmap Data

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Aha! initiatives
        run: node scripts/fetch-aha.js
        env:
          AHA_API_TOKEN: ${{ secrets.AHA_API_TOKEN }}
          AHA_SUBDOMAIN: ${{ secrets.AHA_SUBDOMAIN }}

      - name: Commit and push data.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: refresh roadmap data"
          git push
